<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Setlist — SetNotes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0e0e10;
      --surface: #17171a;
      --border:  #2a2a2e;
      --accent:  #00c853;
      --accent2: #00e676;
      --text:    #f0ede8;
      --muted:   #8a8680;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5vw;
      height: 60px;
      background: rgba(14,14,16,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 5vw;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 20px;
      display: block;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    p {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: #0e0e10;
      font-size: 1rem;
      font-weight: 800;
      padding: 16px 32px;
      border-radius: 999px;
      text-decoration: none;
      width: 100%;
      justify-content: center;
      transition: transform 0.15s, opacity 0.15s;
      box-shadow: 0 0 40px rgba(0,200,83,0.2);
    }
    .btn:hover { transform: translateY(-2px); opacity: 0.92; }

    .hint {
      margin-top: 20px;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 20px 5vw;
      text-align: center;
    }
    footer p { font-size: 0.8rem; color: var(--muted); }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">SetNotes</a>
</nav>

<main>
  <div class="card">
    <span class="icon">🎵</span>
    <h1>You received a setlist</h1>
    <p>Someone shared a SetNotes setlist with you. Download the app to open it on your iPhone, iPad or Mac.</p>

    <a class="btn" href="https://apps.apple.com/app/id6771142337" target="_blank" rel="noopener">
      <svg width="18" height="21" viewBox="0 0 14 17" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M11.53 9.01C11.52 7.47 12.27 6.3 13.79 5.44C12.96 4.26 11.7 3.6 10.04 3.48C8.47 3.37 6.75 4.41 6.14 4.41C5.5 4.41 3.98 3.52 2.77 3.52C0.27 3.56 -2.38419e-07 5.57 -2.38419e-07 7.66C-2.38419e-07 10.84 2.01 15.75 4.07 15.75C4.97 15.77 5.6 15.13 7 15.13C8.37 15.13 8.94 15.75 9.97 15.75C12.05 15.75 13.9 11.19 13.9 8.05C13.08 9.01 11.54 9.01 11.53 9.01ZM9.29 2.28C10.58 0.76 10.46 -0.62 10.42 -1.09C9.28 -1.04 7.96 -0.27 7.21 0.62C6.39 1.57 5.9 2.74 6.02 3.46C7.26 3.55 8.38 2.85 9.29 2.28Z" fill="#0e0e10"/>
      </svg>
      Get SetNotes on the App Store
    </a>

    <p class="hint">Already have SetNotes? Make sure you have the latest version and tap the link again.</p>
  </div>
</main>

<footer>
  <p><a href="/">setnotes.no</a></p>
</footer>

</body>
</html>
